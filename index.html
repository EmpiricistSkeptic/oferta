<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep-navy:   #07090f;
      --midnight:    #0d1220;
      --indigo-deep: #141830;
      --violet-soft: #1e1a3a;
      --amber-glow:  rgba(255, 185, 80, 0.12);
      --amber-warm:  rgba(255, 200, 110, 0.22);
      --blue-glow:   rgba(90, 120, 220, 0.18);
      --card-bg:     rgba(18, 22, 40, 0.55);
      --card-border: rgba(180, 160, 255, 0.14);
      --text-main:   #e8e0d4;
      --text-dim:    rgba(232, 224, 212, 0.55);
      --btn-text:    rgba(232, 224, 212, 0.9);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--deep-navy);
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--text-main);
    }

    /* ─── CANVAS LAYER ─── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─── VIGNETTE ─── */
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background: radial-gradient(
        ellipse 70% 70% at 50% 50%,
        transparent 40%,
        rgba(4, 6, 14, 0.72) 100%
      );
    }

    /* ─── WARM EDGE GLOW ─── */
    .edge-glow {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 40% 60% at 0%   60%, rgba(255,165,60,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 100% 40%, rgba(255,165,60,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 50%  0%,  rgba(90,100,200,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 50%  100%,rgba(90,100,200,0.07) 0%, transparent 70%);
      animation: edgePulse 6s ease-in-out infinite alternate;
    }
    @keyframes edgePulse {
      0%   { opacity: 0.7; }
      100% { opacity: 1.0; }
    }

    /* ─── STAGE ─── */
    #stage {
      position: fixed; inset: 0;
      z-index: 2;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    /* ─── SCENE ─── */
    .scene {
      display: none;
      width: 100%; max-width: 720px;
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .scene.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .scene.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ─── GLASS CARD ─── */
    .card {
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border-radius: 32px;
      padding: 72px 80px;
      position: relative;
      /* gradient glow border */
      border: 1px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 0 1px rgba(160, 140, 255, 0.13),
        0 0 60px rgba(90, 80, 200, 0.14),
        0 0 120px rgba(255, 170, 60, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 0 40px rgba(255, 180, 80, 0.04);
    }
    /* glow ring pseudo */
    .card::before {
      content: '';
      position: absolute; inset: -1px;
      border-radius: 33px;
      background: linear-gradient(
        135deg,
        rgba(140, 120, 255, 0.25) 0%,
        rgba(100, 80, 200, 0.10) 30%,
        rgba(255, 180, 70, 0.15) 70%,
        rgba(140, 120, 255, 0.20) 100%
      );
      z-index: -1;
    }

    /* ─── SCENE NUMBER ─── */
    .scene-num {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 36px;
    }

    /* ─── TEXT LINES ─── */
    .text-body {
      font-size: clamp(1.15rem, 2.2vw, 1.45rem);
      font-weight: 300;
      line-height: 1.85;
      color: var(--text-main);
      max-width: 600px;
      text-align: center;
      margin: 0 auto;
    }
    .text-body .line {
      display: block;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .text-body .line.revealed {
      opacity: 1;
      transform: translateY(0);
    }
    /* italic for first line of scene 1 */
    .scene-intro {
      font-style: italic;
      font-size: clamp(1.3rem, 2.5vw, 1.7rem);
      color: rgba(232, 224, 212, 0.9);
    }

    /* ─── DECORATIVE DIVIDER ─── */
    .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,180,255,0.4), transparent);
      margin: 28px auto;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }
    .visible .divider { opacity: 1; }

    /* ─── BUTTON ─── */
    .btn-wrap {
      margin-top: 52px;
      display: flex; justify-content: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .btn-wrap.show { opacity: 1; transform: translateY(0); }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--btn-text);
      background: transparent;
      border: 1px solid rgba(180, 160, 255, 0.25);
      border-radius: 100px;
      padding: 14px 44px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 120% 120% at 50% 50%, rgba(180,150,255,0.08), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(130,110,220,0.22), 0 0 0 1px rgba(200,180,255,0.2);
      border-color: rgba(200, 180, 255, 0.42);
    }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(-1px); }

    /* ─── CTA FINAL BUTTON ─── */
    .btn-cta {
      font-size: 13px;
      letter-spacing: 0.18em;
      padding: 18px 56px;
      border-color: rgba(255, 185, 100, 0.35);
      color: rgba(255, 215, 150, 0.9);
      box-shadow: 0 0 30px rgba(255,170,60,0.08);
    }
    .btn-cta:hover {
      box-shadow: 0 8px 40px rgba(255,160,60,0.2), 0 0 0 1px rgba(255,200,120,0.3);
      border-color: rgba(255, 200, 120, 0.55);
    }

    /* ─── PROGRESS DOTS ─── */
    #progress {
      position: fixed;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex; gap: 8px; align-items: center;
      opacity: 0.5;
      transition: opacity 0.4s ease;
    }
    #progress:hover { opacity: 0.85; }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(200,180,255,0.3);
      transition: background 0.4s ease, transform 0.4s ease;
    }
    .dot.active {
      background: rgba(200,180,255,0.85);
      transform: scale(1.3);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .card { padding: 44px 32px; border-radius: 24px; }
      .btn-wrap { margin-top: 36px; }
    }
  </style>
</head>
<body>

<!-- Background canvas -->
<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>
<div class="edge-glow"></div>

<!-- Progress dots -->
<div id="progress"></div>

<!-- Stage -->
<div id="stage"></div>

<script>
// ─── SCENE DATA ────────────────────────────────────────────────
const scenes = [
  {
    num: "I",
    lines: [
      { text: "Hay momentos en la vida en los que las palabras en un chat se quedan cortas.", cls: "scene-intro" },
      { text: "Hoy sentí que era el momento de detenerme y decirte las cosas como realmente son, sin prisas, en un espacio dedicado solo para ti." },
      { text: "No es solo un mensaje — es mi forma de mostrarte que lo que siento tiene un lugar sólido en mi mundo." }
    ],
    btn: "continuar"
  },
  {
    num: "II",
    lines: [
      { text: "Cuando te miro, no solo veo a una mujer increíblemente hermosa." },
      { text: "Veo tu timidez, esa que intentas ocultar a veces, pero que para mí es el reflejo de la nobleza de tu alma." },
      { text: "Veo la pureza en tus ojos, esa luz que parece intacta a pesar de todo." }
    ],
    btn: "continuar"
  },
  {
    num: "III",
    lines: [
      { text: "Adoro cómo te ríes cuando te da vergüenza, y cómo, poco a poco, has dejado que yo vea quién eres de verdad." },
      { text: "Tienes una elegancia natural que nace de tu bondad, y eso es lo que más admiro de ti." }
    ],
    btn: "continuar"
  },
  {
    num: "IV",
    lines: [
      { text: "Sé que a veces te exiges demasiado, que temes no ser \"perfecta\" o que tus cicatrices del pasado puedan asustarme." },
      { text: "Pero escucha bien: tus heridas no me alejan — me hacen respetarte más por la fuerza que tienes." },
      { text: "No necesitas ser perfecta para ser valorada. Para mí, ya eres suficiente." }
    ],
    btn: "continuar"
  },
  {
    num: "V",
    lines: [
      { text: "Quiero ser el hombre que te dé la paz y la seguridad que siempre mereciste." },
      { text: "El lugar donde puedas bajar la guardia y simplemente ser tú misma." }
    ],
    btn: "continuar"
  },
  {
    num: "VI",
    lines: [
      { text: "Hoy hablamos de cosas profundas, de sueños que quizás antes veías lejanos, como la idea de tener una familia." },
      { text: "Escuchar eso de ti me hizo entender que somos más que dos personas que se gustan — somos un equipo." }
    ],
    btn: "continuar"
  },
  {
    num: "VII",
    lines: [
      { text: "Quiero que seas mi mejor amiga, mi cómplice en todo lo que venga, la persona con la que pueda hablar de mis metas y compartir mis miedos." },
      { text: "Juntos podemos construir algo que nadie pueda romper." }
    ],
    btn: "continuar"
  },
  {
    num: "VIII",
    lines: [
      { text: "Te amo con una fuerza que me motiva a ser mejor cada día.", cls: "scene-intro" },
      { text: "No quiero que esto sea solo una etapa. Quiero que sea nuestra historia." },
      { text: "Hay algo más que quiero decirte, pero prefiero hacerlo escuchando tu voz…" }
    ],
    btn: "quiero escuchar tu voz",
    isFinal: true
  }
];

// ─── BUILD SCENES ───────────────────────────────────────────────
const stage = document.getElementById('stage');
const progressEl = document.getElementById('progress');
let currentIndex = 0;
let canAdvance = false;

function buildScenes() {
  scenes.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'scene';
    el.id = `scene-${i}`;

    let linesHTML = s.lines.map((l, li) =>
      `<span class="line ${l.cls || ''}" style="transition-delay:${(li * 0.18) + 0.1}s">${l.text}</span>`
    ).join('\n');

    el.innerHTML = `
      <div class="card">
        <p class="scene-num">— ${s.num} —</p>
        <div class="text-body">${linesHTML}</div>
        <div class="divider"></div>
        <div class="btn-wrap">
          <button class="btn ${s.isFinal ? 'btn-cta' : ''}" onclick="advance()">${s.btn}</button>
        </div>
      </div>`;
    stage.appendChild(el);

    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.id = `dot-${i}`;
    progressEl.appendChild(dot);
  });
}

// ─── SHOW SCENE ─────────────────────────────────────────────────
function showScene(idx, direction = 1) {
  canAdvance = false;

  // hide old
  const old = document.querySelector('.scene.active');
  if (old) {
    old.style.opacity = '0';
    old.style.transform = 'scale(0.97)';
    setTimeout(() => {
      old.classList.remove('active', 'visible');
      old.querySelectorAll('.line').forEach(l => l.classList.remove('revealed'));
      old.querySelector('.btn-wrap').classList.remove('show');
    }, 500);
  }

  // update dots
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));

  setTimeout(() => {
    const el = document.getElementById(`scene-${idx}`);
    el.classList.add('active');
    el.style.opacity = '0';
    el.style.transform = 'scale(0.98)';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.classList.add('visible');
        el.style.opacity = '';
        el.style.transform = '';

        // reveal lines
        const lines = el.querySelectorAll('.line');
        lines.forEach((line, i) => {
          setTimeout(() => line.classList.add('revealed'), 120 + i * 200);
        });

        // show button after lines
        const totalDelay = 120 + lines.length * 200 + 400;
        setTimeout(() => {
          el.querySelector('.btn-wrap').classList.add('show');
          canAdvance = true;
        }, totalDelay);
      });
    });
  }, old ? 550 : 0);
}

// ─── ADVANCE ────────────────────────────────────────────────────
function advance() {
  if (!canAdvance) return;

  if (currentIndex < scenes.length - 1) {
    currentIndex++;
    showScene(currentIndex);
  } else {
    // final action — replace button text
    const btn = document.querySelector(`#scene-${currentIndex} .btn`);
    btn.textContent = '💫';
    btn.style.pointerEvents = 'none';
    setTimeout(() => {
      btn.textContent = 'te amo ✦';
      btn.style.pointerEvents = 'none';
    }, 800);
  }
}

// ─── CANVAS BACKGROUND ──────────────────────────────────────────
(function initCanvas() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ─── GRADIENT BASE ───
  function drawGradient() {
    const g = ctx.createRadialGradient(W*0.5, H*0.45, 0, W*0.5, H*0.5, Math.max(W,H)*0.8);
    g.addColorStop(0,   '#111628');
    g.addColorStop(0.4, '#0d1220');
    g.addColorStop(0.7, '#0a0d1a');
    g.addColorStop(1,   '#07090f');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  // ─── ORBS ───
  const orbs = Array.from({length: 6}, (_, i) => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: 180 + Math.random() * 200,
    vx: (Math.random() - 0.5) * 0.12,
    vy: (Math.random() - 0.5) * 0.10,
    hue: i < 3 ? 'blue' : 'amber',
    alpha: 0.06 + Math.random() * 0.06,
    phase: Math.random() * Math.PI * 2
  }));

  function drawOrbs(t) {
    orbs.forEach(o => {
      o.x += o.vx;
      o.y += o.vy;
      if (o.x < -o.r)      o.x = W + o.r;
      if (o.x > W + o.r)   o.x = -o.r;
      if (o.y < -o.r)      o.y = H + o.r;
      if (o.y > H + o.r)   o.y = -o.r;

      const pulse = 1 + 0.06 * Math.sin(t * 0.0004 + o.phase);
      const r = o.r * pulse;
      const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);

      if (o.hue === 'blue') {
        grad.addColorStop(0,   `rgba(70, 90, 200, ${o.alpha})`);
        grad.addColorStop(0.5, `rgba(50, 60, 160, ${o.alpha * 0.5})`);
        grad.addColorStop(1,   `rgba(30, 40, 120, 0)`);
      } else {
        grad.addColorStop(0,   `rgba(255, 170, 50, ${o.alpha * 0.7})`);
        grad.addColorStop(0.5, `rgba(220, 130, 30, ${o.alpha * 0.3})`);
        grad.addColorStop(1,   `rgba(180, 100, 20, 0)`);
      }
      ctx.fillStyle = grad;
      ctx.fillRect(o.x - r, o.y - r, r*2, r*2);
    });
  }

  // ─── PARTICLES ───
  const particles = Array.from({length: 90}, () => ({
    x: Math.random() * 1,  // stored as 0-1 fraction
    y: Math.random() * 1,
    size: 0.5 + Math.random() * 1.5,
    vy: -(0.008 + Math.random() * 0.02),
    alpha: 0.1 + Math.random() * 0.35,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: 0.002 + Math.random() * 0.004
  }));

  function drawParticles(t) {
    particles.forEach(p => {
      p.y += p.vy * 0.016;
      p.twinkle += p.twinkleSpeed;
      if (p.y < 0) { p.y = 1; p.x = Math.random(); }

      const a = p.alpha * (0.5 + 0.5 * Math.sin(p.twinkle));
      ctx.beginPath();
      ctx.arc(p.x * W, p.y * H, p.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(220, 210, 255, ${a})`;
      ctx.fill();
    });
  }

  // ─── LOOP ───
  function loop(t) {
    ctx.clearRect(0, 0, W, H);
    drawGradient();
    drawOrbs(t);
    drawParticles(t);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

// ─── INIT ────────────────────────────────────────────────────────
buildScenes();
showScene(0);
</script>
</body>
</html>
